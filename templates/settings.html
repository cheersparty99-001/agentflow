{% extends "base.html" %}
{% block title %} — Settings{% endblock %}
{% block content %}

<div class="max-w-2xl mx-auto">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">Settings</h1>
      <p class="text-sm text-slate-500 mt-1">Manage your account</p>
    </div>
  </div>

  <!-- General Settings -->
  <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
    <div class="px-6 py-4 border-b border-slate-100">
      <h2 class="font-semibold text-slate-800">General</h2>
    </div>
    <div class="p-6 space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Agency Name</label>
        <input type="text" id="s-name" value="{{ agency_name }}" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Phone</label>
        <input type="text" id="s-phone" value="" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <input type="email" id="s-email" value="" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Language</label>
        <select id="s-lang" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
          <option value="en">English</option>
          <option value="bm">Bahasa Malaysia</option>
          <option value="zh">中文</option>
        </select>
      </div>
    </div>
    <div class="px-6 py-4 bg-slate-50 border-t border-slate-100">
      <button onclick="saveSettings()" class="px-6 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors">
        Save Settings
      </button>
      <span id="save-status" class="ml-3 text-sm text-green-600 hidden">Saved!</span>
    </div>
  </div>

  {% if demo_mode %}
  <div class="mt-6 bg-amber-50 border border-amber-200 rounded-xl p-4">
    <p class="text-sm text-amber-700">
      <strong>Demo Mode:</strong> Settings are not persisted to the database.
      Changes work for the current session only.
    </p>
  </div>
  {% endif %}
</div>

<script>
async function loadSettings() {
  try {
    const r = await fetch('/api/settings');
    const d = await r.json();
    document.getElementById('s-name').value = d.agency_name || '';
    document.getElementById('s-phone').value = d.phone || '';
    document.getElementById('s-email').value = d.email || '';
    if (d.language) document.getElementById('s-lang').value = d.language;
  } catch(e) {}
}
loadSettings();

async function saveSettings() {
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = 'Saving...';

  const form = new FormData();
  form.append('agency_name', document.getElementById('s-name').value);
  form.append('phone', document.getElementById('s-phone').value);
  form.append('email', document.getElementById('s-email').value);
  form.append('language', document.getElementById('s-lang').value);

  try {
    const r = await fetch('/api/settings', { method: 'POST', body: form });
    const d = await r.json();
    if (d.success) {
      const status = document.getElementById('save-status');
      status.classList.remove('hidden');
      setTimeout(() => status.classList.add('hidden'), 2000);
    }
  } catch(e) {
    alert('Failed to save settings');
  }

  btn.disabled = false;
  btn.textContent = 'Save Settings';
}
</script>

{% endblock %}
