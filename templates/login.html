<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowreach - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <img src="/static/images/flowreach-logo-dark.svg" alt="Flowreach" class="h-8 mx-auto mb-4">
      <h1 class="text-3xl font-bold text-white tracking-tight">Flowreach</h1>
      <p class="text-slate-400 mt-2 text-sm">B2B Sales Automation Platform</p>
    </div>
    <div class="bg-white rounded-xl shadow-2xl p-8">
      <h2 class="text-xl font-semibold text-slate-900 mb-6">Sign in to your account</h2>
      <form id="login-form" method="POST" action="/login" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
          <input type="email" name="email" id="email" required
            class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
            placeholder="you@company.com">
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <input type="password" name="password" id="password" required
            class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
            placeholder="Enter your password">
        </div>
        <button type="submit"
          class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-medium text-sm hover:bg-blue-700 transition-colors focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
          Sign In
        </button>
      </form>
    </div>
  </div>
</body>
</html>
